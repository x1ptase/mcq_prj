<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mutiple Choice Quiz</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>
    <div class="main-wrapper">
        <div class="glass-container">
            <header>
                <h1>Multiple Choice Quiz</h1>
                <div class="control-panel">
                    <button onclick="refreshQuiz()" class="btn-refresh-top">
                        <span class="icon">🔄</span> Làm mới bài thi
                    </button>
                </div>
            </header>

            <div id="quiz-container">
                <div class="loading-state">
                    <div class="spinner"></div>
                    <p>Đang tải câu hỏi...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let questions = [];

        // Tải câu hỏi lần đầu
        async function load() {
            try {
                const res = await fetch('/get-questions');
                questions = await res.json();
                render();
            } catch (e) { document.getElementById('quiz-container').innerText = "Lỗi tải dữ liệu!"; }
        }

        // Hàm Reset toàn bộ bài
        function refreshQuiz() {
            // Hiệu ứng xác nhận nhẹ
            if(confirm("Bạn có muốn xóa hết kết quả và làm lại từ đầu không?")) {
                render(); // Vẽ lại giao diện từ mảng questions đã lưu
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function render() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = questions.map((q, i) => {
                const isMulti = q.correct_answer.trim().length > 1;
                const isImageQuestion = q.question.match(/\.(jpeg|jpg|gif|png|svg)$/i);
                
                const questionContent = isImageQuestion 
                    ? `<div class="image-question">
                        <p class="q-num">Question ${i+1}</p>
                        <img src="/img/${q.question}" alt="Question Image" class="main-q-img">
                    </div>`
                    : `<div class="question-header">
                        <p class="q-num">Question ${i+1}</p>
                        <div class="q-text">${q.question}</div>
                       </div>`;

                return `
                <div class="quiz-card" id="card-${q.id}" style="animation-delay: ${i * 0.1}s">
                    ${questionContent}

                    <div class="options">
                        ${['A','B','C','D'].map(l => `
                            <label class="opt">
                                <input type="${isMulti ? 'checkbox' : 'radio'}" 
                                    name="q${q.id}" 
                                    value="${l}" 
                                    onchange="checkInstant(${q.id}, '${l}')">
                                <div class="box"><b>${l}.</b> <span>${q['option_'+l.toLowerCase()]}</span></div>
                            </label>
                        `).join('')}
                    </div>
                    <div id="msg-${q.id}" class="feedback-msg"></div>
                </div>`;
            }).join('');
        }

        function checkInstant(qId, label) {
            const question = questions.find(q => q.id === qId);
            const card = document.getElementById(`card-${qId}`);
            const msg = document.getElementById(`msg-${qId}`);
            const correctAns = question.correct_answer.trim().toUpperCase();
            
            const selectedInputs = Array.from(card.querySelectorAll(`input[name="q${qId}"]:checked`));
            const selectedStr = selectedInputs.map(i => i.value).sort().join('');

            card.querySelectorAll('.box').forEach(b => b.classList.remove('correct', 'wrong'));

            if (correctAns.length === 1) {
                const selectedInput = card.querySelector(`input[name="q${qId}"]:checked`);
                const box = selectedInput.nextElementSibling;
                if (selectedStr === correctAns) {
                    box.classList.add('correct');
                    msg.innerHTML = '<span class="icon">✨</span> Chính xác! Bạn làm rất tốt.';
                    msg.style.color = "var(--success)";
                } else {
                    box.classList.add('wrong');
                    msg.innerHTML = `<span class="icon">❌</span> Sai rồi. Đáp án đúng là <b>${correctAns}</b>`;
                    msg.style.color = "var(--error)";
                }
                card.querySelectorAll('input').forEach(i => i.disabled = true);
            } else {
                if (selectedStr.length === correctAns.length) {
                    if (selectedStr === correctAns) {
                        selectedInputs.forEach(i => i.nextElementSibling.classList.add('correct'));
                        msg.innerHTML = '<span class="icon">✨</span> Tuyệt vời! Tất cả đều đúng.';
                        msg.style.color = "var(--success)";
                    } else {
                        selectedInputs.forEach(i => i.nextElementSibling.classList.add('wrong'));
                        msg.innerHTML = `<span class="icon">❌</span> Chưa đúng. Đáp án đúng là: <b>${correctAns}</b>`;
                        msg.style.color = "var(--error)";
                    }
                    card.querySelectorAll('input').forEach(i => i.disabled = true);
                } else {
                    msg.innerHTML = `<span class="icon">🔔</span> Hãy chọn đủ ${correctAns.length} đáp án...`;
                    msg.style.color = "var(--warning)";
                }
            }
        }

        window.onload = load;
    </script>
</body>
</html>
